name: Cypress E2E + Slack Notify
env:
  email: "AAAA"
on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
    inputs:
      # 你要传的参数（可自定义）
      CASENAME:
        description: "测试用例名称"
        required: true
        default: "cypress/e2e/**/*.cy.js"
jobs:
  cypress-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 使用 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 关键修复：用 npm install 代替 npm ci，彻底解决 lockfile 报错
      - name: Install dependencies
        run: npm install

      # 运行 Cypress 测试
      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
        env:
          CI: true
          CYPRESS_CASENAME: ${{ inputs.casename }}

      # ==================== 日志输出 + 统计 ====================
      - name: 生成 Cypress 报告与日志
        if: always()
        run: |
          # 生成 JSON 报告（统计用）
          npx cypress run --reporter json > cypress-report.json 2>&1 || true
          # 输出日志到控制台
          cat cypress-report.json

      # ==================== 解析成功/失败/跳过 ====================
      - name: 解析测试统计
        if: always()
        id: parse
        run: |
          PASSED=$(jq '.stats.passed // 0' cypress-report.json)

          # 日志后50行
          LOG=$(tail -n 60 cypress-report.json | tr -d '"')
          LOG="${LOG//$'\n'/'%0A'}"

          # 写入环境变量
          echo "PASSED=$PASSED" >> $GITHUB_ENV
          echo $PASSED
 
      - name: 获取当前用户的邮箱
        id: get-email
        run: |
          # 获取触发者邮箱
          email=$(gh api users/${{ github.actor }} --jq '.email')
          echo $email
          echo "email=$email" >> $GITHUB_ENV
          echo ${{ env.email }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # =============================================
      # ✅ 修复：无论成功失败都发邮件
      # =============================================
      - name: 发送测试结果邮件
        if: always()  # 👈 关键在这里！
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: ：）Cypress 自动化测试结果，全部通过
          body: |
            测试完成！
            运行用例：${{ inputs.casename }}
            运行状态：${{ job.status }}
          to: ${{ env.email }}
          from: GitHub Actions

      # ==============================================
      # 自动发送测试结果到 Slack（成功/失败都会发）
      # ==============================================
      - name: Send result to Slack
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "🧪 Cypress 自动化测试完成\n\n📦 项目：${{ github.repository }}\n👤 操作者：${{ github.actor }}\n✅ 状态：${{ job.status }}\n🔗 查看日志：${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
