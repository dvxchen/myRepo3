name: CI Notify

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 你的构建/测试命令
      - name: Run tests
        run: |
          echo "Running tests..."
          exit 1  # 打开这行模拟失败

  notify:
    needs: build
    if: always() # 无论成功/失败/取消都执行
    runs-on: ubuntu-latest
    steps:
      - name: Send status email
        uses: dawidd6/action-send-mail@v3
        with:
          # SMTP 配置
          server_address: smtp.qq.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }} # QQ邮箱用授权码

          # 邮件内容
          subject: |
            ${{ job.status == 'success' && '✅' || '' }} CI ${{ job.status }}: ${{ github.repository }}
          body: |
            CI 执行结果：${{ job.status }}
            仓库：${{ github.repository }}
            分支：${{ github.ref }}
            触发人：${{ github.actor }}
            运行链接：https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

          # 发件人 & 收件人
          from: GitHub CI Bot <ci-bot@example.com>
          to: davy.chen@sap.com # 可写任意多个邮箱
