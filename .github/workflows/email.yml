name: 发送邮件通知
env:
  email: "AAA"
on:
  push:
  workflow_dispatch: # 允许手动运行

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - name: 获取当前用户的邮箱
        id: get-email
        run: |
          # 获取触发者邮箱
          env.email=$(gh api users/${{ github.actor }} --jq '.email')
          echo "user_email=$EMAIL" >> $GITHUB_OUTPUT
          echo $GITHUB_OUTPUT
          echo $EMAIL
          echo ${{ env.email }} 
          
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 发送邮件
        uses: dawidd6/action-send-mail@v3
        with:
          # 发件邮箱配置
          server_address: smtp.163.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          
          # 邮件内容
          subject: GitHub 自动通知
          body: |
            操作人：${{ github.actor }}
            触发事件：${{ github.event_name }}
            仓库：${{ github.repository }}
          from: GitHub Actions
          # 收件人（自动获取的用户邮箱）
          to: $(gh api users/${{ github.actor }} --jq '.email')
